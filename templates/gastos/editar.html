{% extends 'layouts/base.html' %}

{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800">Editar Gasto</h1>
    
    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">Detalles del Gasto</h6>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('main.editar_gasto', id_gasto=gasto.id_gasto) }}" method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Fecha</label>
                                <input type="date" class="form-control" name="fecha" value="{{ gasto.fecha }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Costo</label>
                                <input type="number" step="0.01" class="form-control" name="costo" value="{{ gasto.costo }}" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Categoría</label>
                            <select class="form-control" name="id_categoria" required>
                                <option value="1" {% if gasto.id_categoria == 1 %}selected{% endif %}>Arrendamiento</option>
                                <option value="2" {% if gasto.id_categoria == 2 %}selected{% endif %}>Servicios Públicos</option>
                                <option value="3" {% if gasto.id_categoria == 3 %}selected{% endif %}>Transporte</option>
                                <option value="4" {% if gasto.id_categoria == 4 %}selected{% endif %}>Educación</option>
                                <option value="5" {% if gasto.id_categoria == 5 %}selected{% endif %}>Entretenimiento</option>
                                <option value="6" {% if gasto.id_categoria == 6 %}selected{% endif %}>Deudas</option>
                                <option value="7" {% if gasto.id_categoria == 7 %}selected{% endif %}>Alimentación</option>
                                <option value="8" {% if gasto.id_categoria == 8 %}selected{% endif %}>Ocio y Diversión</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Descripción</label>
                            <textarea class="form-control" name="descripcion_gasto" rows="3">{{ gasto.descripcion_gasto }}</textarea>
                        </div>
                        <button type="submit" class="btn btn-success">Actualizar Cambios</button>
                        <a href="{{ url_for('main.ver_gastos') }}" class="btn btn-secondary">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
